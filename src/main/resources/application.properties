# ===================================
# Server
# ===================================
server.port=8080

# ===================================
# Datasource — switch to MySQL for prod
# Using H2 in-memory for quick local dev
# ===================================
spring.datasource.url=jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- MySQL (uncomment for production) ---
# spring.datasource.url=jdbc:mysql://localhost:3306/finance_db?useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# JPA / Hibernate
# ===================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For MySQL: org.hibernate.dialect.MySQLDialect

# ===================================
# JWT Configuration
# ===================================
# Generate a strong 256-bit base64 secret for production!
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.access-token-expiration=900000
# 15 minutes in ms
app.jwt.refresh-token-expiration=604800000
# 7 days in ms

# ===================================
# Logging
# ===================================
logging.level.com.finance=DEBUG
logging.level.org.springframework.security=INFO
